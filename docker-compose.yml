services:
  kiro-rs:
    image: ghcr.io/${GHCR_OWNER:?Set GHCR_OWNER}/${IMAGE_NAME:-kiro-rs}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: ${CONTAINER_NAME:-kiro-rs}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${HOST_PORT:-8990}:8990"
    volumes:
      - ./config/:/app/config/
    restart: unless-stopped
